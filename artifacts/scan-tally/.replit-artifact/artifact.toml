kind = "web"
previewPath = "/"
title = "RocketXpress Scan Tally"
version = "1.0.0"
id = "artifacts/scan-tally"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19052

[services.development]
run = "pnpm --filter @workspace/scan-tally run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/scan-tally", "run", "build" ]
publicDir = "artifacts/scan-tally/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19052"
BASE_PATH = "/"
